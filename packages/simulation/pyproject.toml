[project]
name = "gira-simulation"
version = "0.0.0"
description = "Bayesian generative simulation of GIRA bicycle station dynamics"
requires-python = ">=3.13"
dependencies = [
    "numpy>=1.24",
    "scipy>=1.11",
    "matplotlib>=3.7",
    "duckdb>=0.10",
]

[project.optional-dependencies]
inference = [
    "pymc>=5.10",
    "numpyro>=0.13",
    "arviz>=0.17",
    "jax>=0.4.20",
    "jaxlib>=0.4.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/simulation"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["F", "E", "W", "I", "UP", "C4", "SIM", "PTH", "RET", "TCH"]

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.13"
include = ["src"]
reportMissingTypeStubs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["--strict-markers", "--strict-config"]
markers = [
    "unit: Unit tests (no external deps)",
]

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "pytest>=9.0.2",
    "ruff>=0.15.9",
]
