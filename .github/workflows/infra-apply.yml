name: Infrastructure

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply

jobs:
  tofu:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
      TF_VAR_hetzner_token: ${{ secrets.HETZNER_TOKEN }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_vercel_api_token: ${{ secrets.VERCEL_TOKEN }}
      TF_VAR_vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
      TF_VAR_github_token: ${{ secrets.GH_PAT }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_r2_access_key_id: ${{ secrets.R2_ACCESS_KEY }}
      TF_VAR_r2_secret_access_key: ${{ secrets.R2_SECRET_KEY }}
      TF_VAR_motherduck_token: ${{ secrets.MOTHERDUCK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - run: tofu init
      - name: Plan
        if: inputs.action == 'plan'
        run: tofu plan -var-file=environments/production.tfvars -no-color
      - name: Apply
        if: inputs.action == 'apply'
        run: |
          tofu plan -var-file=environments/production.tfvars -out=tfplan -no-color
          tofu apply -auto-approve tfplan
